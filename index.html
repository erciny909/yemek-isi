    const clampQty = (n) => {
        if (!Number.isFinite(n)) return 1;
        return Math.max(1, Math.min(99, Math.floor(n)));
    };

    const getItemById = (id) => MENU_DATA.find((x) => x.id === id);

    const getTotalCount = () => {
        let total = 0;
        for (const qty of items.values()) total += qty;
        return total;
    };

    const updateBadge = () => {
        const badge = document.getElementById('cart-badge');
        if (badge) badge.textContent = String(getTotalCount());
    };

    // SENİN İSTEDİĞİN GÖRSEL EFEKT FONKSİYONU
    // toggleUI fonksiyonunu bu şekilde GÜNCELLE
    // UI Güncelleme: Butonun durumuna göre metin ve fonksiyonu değiştirir
    const toggleUI = (btn, id, isInCart) => {
        const alertBox = document.getElementById('custom-alert');
        btn.innerHTML = '<span>✕</span> Sepetten Çıkar';
        if (btn) {
            if (isInCart) {
                // Sepete Eklendiğinde
                btn.innerText = "Sepetten Çıkar";
                btn.classList.add('is-in-cart');
                btn.onclick = () => CartService.remove(id, btn);
                
                // UYARI BURADA TETİKLENİR
                if (alertBox) {
                    alertBox.style.display = 'block';
                    // 3 saniye sonra otomatik kapansın istersen:
                    // setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
                }
            } else {
                // Sepetten Çıkarıldığında
                btn.innerText = "Sepete Ekle";
                btn.classList.remove('is-in-cart');
                btn.onclick = () => CartService.add(id, btn);
                if (alertBox) alertBox.style.display = 'none';
            }
        }
    };

    const add = (id, btnElement) => {
        const n = Number(id);
        if (isNaN(n)) return;
        items.set(n, clampQty((items.get(n) || 0) + 1));
        updateBadge();
        toggleUI(btnElement, id, true); // Eklendi durumuna sok
    };

    const remove = (id, btnElement) => {
        const n = Number(id);
        if (isNaN(n)) return;
        items.delete(n);
        updateBadge();
        toggleUI(btnElement, id, false); // Çıkarıldı (Eski) durumuna döndür
    };

    const setQty = (id, qty) => {
        const n = Number(id);
        if (!Number.isFinite(n)) return;
        items.set(n, clampQty(Number(qty)));
        updateBadge();
    };

    

    const clear = () => {
        items.clear();
        updateBadge();
    };

    const getLines = () => {
        const lines = [];
        for (const [id, qty] of items.entries()) {
            const item = getItemById(id);
            if (!item) continue;
            lines.push({ id, qty, ad: item.ad });
        }
        return lines;
    };

    const buildWhatsAppMessage = () => {
        const lines = getLines();
        if (lines.length === 0) return 'Merhaba, sepetim boş görünüyor.';
        const body = lines.map((l) => `- ${l.ad} x ${l.qty}`).join('\n');
        return `Merhaba, aşağıdaki ürünlerden sipariş vermek istiyorum:\n${body}`;
    };

    // TÜM FONKSİYONLARI BURADA DIŞARI AÇIYORUZ
    return { 
        add, 
        setQty, 
        remove, 
        clear, 
        getLines, 
        buildWhatsAppMessage, 
        getTotalCount,
        updateBadge
    };
})();

const CartFlow = {
    open: () => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.setAttribute('role', 'dialog');
        overlay.setAttribute('aria-modal', 'true');

        const render = () => {
            const lines = CartService.getLines();
            const listHtml = lines.length === 0
                ? `<div style="padding:10px 0;color:#667;font-size:0.9rem;">Sepetiniz boş.</div>`
                : `
                    <div style="display:grid;gap:10px;">
                        ${lines.map((l) => `
                            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
                                <div style="font-weight:700; font-size:0.9rem; flex:1;">${l.ad}</div>
                                <div class="qty-controls">
                                    <button type="button" class="qty-btn" data-cart="dec" data-id="${l.id}">-</button>
                                    <input class="qty-input" inputmode="numeric" pattern="[0-9]*" value="${l.qty}" data-cart="input" data-id="${l.id}" />
                                    <button type="button" class="qty-btn" data-cart="inc" data-id="${l.id}">+</button>
                                </div>
                                <button type="button" class="qty-btn" title="Sil" data-cart="remove" data-id="${l.id}">✕</button>
                            </div>
                        `).join('')}
                    </div>
                `;

            overlay.innerHTML = `

        
                <div class="modal">
                    <div class="modal-header">
                        <h3 class="modal-title">Sepet</h3>
                        <p class="modal-sub">Birden fazla ürün seçip tek seferde WhatsApp’tan sipariş verebilirsiniz.</p>
                    </div>
                    <div class="modal-body">
                        ${listHtml}
                        <div class="trust-box">
                            Siparişiniz <b>WhatsApp</b> üzerinden gönderilir. Bu ekran sadece sepetinizi düzenlemek içindir.
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-order btn-wide" data-action="checkout" ${lines.length === 0 ? 'disabled style="opacity:.6;cursor:not-allowed;"' : ''}>Sepeti WhatsApp’tan Sipariş Et</button>
                        <button type="button" class="btn btn-cancel btn-wide" data-action="clear" ${lines.length === 0 ? 'disabled style="opacity:.6;cursor:not-allowed;"' : ''}>Sepeti Temizle</button>
                        <button type="button" class="btn btn-cancel btn-wide" data-action="close">Kapat</button>
                    </div>
                </div>
            `;
        };

        const close = () => {
            overlay.remove();
            document.body.style.overflow = '';
        };

        const clampQty = (n) => {
            if (!Number.isFinite(n)) return 1;
            return Math.max(1, Math.min(99, Math.floor(n)));
        };

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) close();

            const action = e.target?.getAttribute?.('data-action');
            if (action === 'close') close();
            if (action === 'clear') { CartService.clear(); render(); }
            if (action === 'checkout') {
                const msg = encodeURIComponent(CartService.buildWhatsAppMessage());
                const url = `https://wa.me/${WHATSAPP_NO}?text=${msg}`;
                window.open(url, '_blank', 'noopener,noreferrer');
                close();
            }

            const cartAction = e.target?.getAttribute?.('data-cart');
            const id = e.target?.getAttribute?.('data-id');
            if (!cartAction || !id) return;

            const lines = CartService.getLines();
            const line = lines.find((l) => String(l.id) === String(id));
            const current = line ? Number(line.qty) : 1;

            if (cartAction === 'inc') { CartService.setQty(id, clampQty(current + 1)); render(); }
            if (cartAction === 'dec') { CartService.setQty(id, clampQty(current - 1)); render(); }
            if (cartAction === 'remove') { CartService.remove(id); render(); }
        });

        overlay.addEventListener('input', (e) => {
            const target = e.target;
            const cartInput = target?.getAttribute?.('data-cart');
            if (cartInput !== 'input') return;
            const id = target.getAttribute('data-id');
            const val = clampQty(Number(target.value));
            CartService.setQty(id, val);
        });

        overlay.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') close();
        });

        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        render();
    }
};

function slugifyTR(input) {
    return String(input || '')
        .trim()
        .toLowerCase()
        .replaceAll('ı', 'i')
        .replaceAll('ğ', 'g')
        .replaceAll('ü', 'u')
        .replaceAll('ş', 's')
        .replaceAll('ö', 'o')
        .replaceAll('ç', 'c')
        .replaceAll(/[^a-z0-9]+/g, '-')
        .replaceAll(/(^-|-$)/g, '');
}

const ImageFallbackService = {
    attach: (rootEl) => {
        if (!rootEl) return;
        const imgs = rootEl.querySelectorAll('img[data-fallback]');
        imgs.forEach((img) => {
            img.addEventListener('error', () => {
                const fallback = img.getAttribute('data-fallback');
                if (!fallback) return;
                if (img.getAttribute('data-fallback-applied') === '1') return;
                img.setAttribute('data-fallback-applied', '1');
                img.src = fallback;
            }, { once: true });
        });
    }
};
const OrderFlow = {
    open: function(yemek) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';

        overlay.innerHTML = `
            <div class="modal">
                <div class="modal-header">
                    <h3 class="modal-title">Sipariş Adedi</h3>
                    <p class="modal-sub"><b>${yemek}</b> için kaç adet istiyorsunuz?</p>
                </div>
                <div class="modal-body">
                    <div class="qty-row">
                        <div style="font-weight:600;">Adet</div>
                        <div class="qty-controls">
                            <button type="button" class="qty-btn" data-qty="dec">-</button>
                            <input class="qty-input" id="order-qty-input" inputmode="numeric" pattern="[0-9]*" value="1" />
                            <button type="button" class="qty-btn" data-qty="inc">+</button>
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-order btn-wide" data-action="continue">Siparişi Onaylıyorum</button>
                    <button type="button" class="btn btn-cancel btn-wide" data-action="cancel">Vazgeç</button>
                </div>
            </div>
        `;

        const close = () => {
            overlay.remove();
            document.body.style.overflow = '';
        };

        const input = overlay.querySelector('#order-qty-input');

        // Yardımcı fonksiyon: Değeri kontrol et ve sınırla
        const validateValue = (val) => {
            let n = parseInt(val);
            if (isNaN(n) || n < 1) return 1;
            if (n > 99) return 99;
            return n;
        };

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) close();

            const qtyAction = e.target.getAttribute('data-qty');
            const currentVal = parseInt(input.value) || 1;

            if (qtyAction === 'inc') input.value = Math.min(99, currentVal + 1);
            if (qtyAction === 'dec') input.value = Math.max(1, currentVal - 1);

            const action = e.target.getAttribute('data-action');
            if (action === 'cancel') close();
            if (action === 'continue') {
                const finalAdet = validateValue(input.value);
                const msg = encodeURIComponent(`Merhaba, *${yemek}* için *${finalAdet} adet* sipariş vermek istiyorum.`);
                const url = `https://wa.me/${WHATSAPP_NO}?text=${msg}`;
                window.open(url, '_blank', 'noopener,noreferrer');
                close();
            }
        });

        // Klavyeden Escape tuşuyla kapatma
        const keyHandler = (e) => {
            if (e.key === 'Escape') {
                close();
                document.removeEventListener('keydown', keyHandler);
            }
        };
        document.addEventListener('keydown', keyHandler);

        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';

        if (input) {
            input.focus();
            input.select(); 

            // Rakam dışındakileri sil ama kutuyu boş bırakmaya izin ver
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });

            // Odak çıktığında eğer boşsa 1 yap
            input.addEventListener('blur', (e) => {
                if (!e.target.value || e.target.value === "0") e.target.value = "1";
            });
        }
    }
};

function getCategories() {
    const otherItems = MENU_DATA.filter(x => !x.isGununMenusu);
    const grouped = otherItems.reduce((acc, item) => {
        const key = item.kategori || "Diğer";
        if (!acc[key]) acc[key] = [];
        acc[key].push(item);
        return acc;
    }, {});
    return Object.keys(grouped).map((name) => ({ name, items: grouped[name] }));
}

function renderCard(item) {
    const resimYolu = item.resim || SABIT_GORSEL;
    const fiyatText = (item.fiyat && String(item.fiyat).trim() !== "") ? `${item.fiyat} TL` : "Fiyat Sor";
    
    // Sepet kontrolü
    const isInCart = CartService.getLines().some(l => Number(l.id) === Number(item.id));
    const btnCartText = isInCart ? "Sepetten Çıkar" : "Sepete Ekle";
    const btnCartClass = isInCart ? "btn btn-cart is-in-cart" : "btn btn-cart";
    const btnCartAction = isInCart ? `CartService.remove(${item.id}, this)` : `CartService.add(${item.id}, this)`;

    return `
        <div class="${item.isGununMenusu ? 'hero-card' : 'card'}">
            <div class="img-box">
                <img src="${resimYolu}" alt="${item.ad}" data-fallback="${SABIT_GORSEL}">
                <div class="price">${fiyatText}</div>
            </div>
            <div class="info">
                ${item.isGununMenusu ? `<h2>${item.ad}</h2>` : `<h3>${item.ad}</h3>`}
                <p>${item.ozet || ''}</p>
                <div class="btn-group" style="display: flex !important; flex-direction: column !important; gap: 8px !important; margin-top: 10px;">
                    
                    <button class="btn btn-order" onclick="OrderService.buyNow('${item.ad}')" style="width: 100% !important;">
                        Sipariş Ver
                    </button>

                    <button class="${btnCartClass}" onclick="${btnCartAction}" style="width: 100% !important;">
                        ${btnCartText}
                    </button>

                </div>
            </div>
        </div>
    `;
}

function getSelectedFeaturedItems() {
    const featuredIds = new Set([2, 3]); // Köfte + Tost ana sayfada görünsün
    return MENU_DATA.filter((x) => featuredIds.has(x.id));
}

function navigateToHome() {
    window.location.hash = '';
}

function navigateToCategory(categoryName) {
    const encoded = encodeURIComponent(categoryName);
    window.location.hash = `kategori=${encoded}`;
}

function getRouteFromHash() {
    const raw = String(window.location.hash || '').replace(/^#/, '');
    if (!raw) return { type: 'home' };

    const m = raw.match(/^kategori=(.+)$/);
    if (!m) return { type: 'home' };

    try {
        const name = decodeURIComponent(m[1]);
        return { type: 'category', name };
    } catch {
        return { type: 'home' };
    }
}

function renderCategoryNav() {
    const categoryNav = document.getElementById('category-nav');
    if (!categoryNav) return;

    const categories = getCategories();
    const route = getRouteFromHash();
    categoryNav.innerHTML = categories.map(({ name }) => {
        const isActive = route.type === 'category' && route.name === name;
        const className = `category-btn${isActive ? ' category-btn--active' : ''}`;
        const safe = name.replaceAll("'", "\\'");
        return `<button class="${className}" type="button" onclick="navigateToCategory('${safe}')">${name}</button>`;
    }).join('');
}

function renderHomeView() {
    const homeView = document.getElementById('home-view');
    const detailView = document.getElementById('detail-view');
    const heroCont = document.getElementById('hero-container');
    const featuredCont = document.getElementById('featured-container');

    if (!homeView || !detailView || !heroCont || !featuredCont) return;

    homeView.classList.remove('hidden');
    detailView.classList.add('hidden');

    const heroItem = MENU_DATA.find(x => x.isGununMenusu);
    heroCont.innerHTML = heroItem ? renderCard(heroItem) : "";

    const featuredItems = getSelectedFeaturedItems();
    featuredCont.innerHTML = featuredItems.map(renderCard).join('');

    ImageFallbackService.attach(homeView);
}

function renderCategoryDetailView(categoryName) {
    const homeView = document.getElementById('home-view');
    const detailView = document.getElementById('detail-view');
    const detailTitle = document.getElementById('detail-title');
    const detailCont = document.getElementById('detail-container');

    if (!homeView || !detailView || !detailTitle || !detailCont) return;

    homeView.classList.add('hidden');
    detailView.classList.remove('hidden');

    const categories = getCategories();
    const match = categories.find(x => x.name === categoryName);

    detailTitle.textContent = match ? match.name : categoryName;
    detailCont.innerHTML = match ? match.items.map(renderCard).join('') : "";

    ImageFallbackService.attach(detailView);
}

function renderApp() {
    renderCategoryNav();

    const route = getRouteFromHash();
    if (route.type === 'home') {
        renderHomeView();
        return;
    }

    if (route.type === 'category') {
        renderCategoryDetailView(route.name);
        return;
    }

    renderHomeView();
}

// Global: inline onclick kullanımı için gerekli
window.navigateToCategory = navigateToCategory;
window.navigateToHome = navigateToHome;
window.OrderFlow = OrderFlow;
window.CartFlow = CartFlow;

// Uygulamayı başlat
document.addEventListener('DOMContentLoaded', () => {
    const backBtn = document.getElementById('back-btn');
    if (backBtn) backBtn.addEventListener('click', navigateToHome);

    const cartBtn = document.getElementById('cart-open-btn');
    if (cartBtn) cartBtn.addEventListener('click', () => CartFlow.open());

    renderApp();
    CartService.updateBadge();
    window.addEventListener('hashchange', renderApp);
});
    </script>
